name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"
      - run: uv sync --extra dev
      - run: uv run ruff check gasregnet
      - run: uv run mypy --strict gasregnet
      - run: uv run pytest -q
